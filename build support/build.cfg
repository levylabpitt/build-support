# build.cfg - per-project build configuration, read by build.bat.
# Format: KEY=VALUE, one per line. A '#' at column 0 is a whole-line comment.
# Do NOT put an inline comment after a value - it becomes part of the value.
# Values may contain spaces. Scaffolded into <repo>\build support\ next to the .vipb.

# What to build:
BUILD_VIP=false
BUILD_INSTALLER=true

# Build-spec names in the .lvproj (only used when BUILD_INSTALLER=true).
# Convention: "<Product> Application" / "<Product> Installer".
APP_SPEC=Patrick Builder Application
INST_SPEC=Patrick Builder Installer

# Run the release step (git commit/merge/tag/push + GitHub release + version bump)?
DO_RELEASE=true

# Optional overrides - uncomment to use.
# LVVER / LVBIT default to the .vipb's Package_LabVIEW_Version:
# LVVER=2019
# LVBIT=64
# VIPB=MyPackage.vipb
LVPROJ=build-support.lvproj
# APP_NAME=Patrick Builder
# PUBLISHER=Levylab
